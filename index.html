<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NY Design Solutions — Medical Device Design & Development</title>
  <meta name="description" content="NY Design Solutions — Noha & Yasser. Expert design, product development, and regulatory consulting for the medical device industry." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="./src/tailwind.config.js"></script>
  <link rel="stylesheet" href="./src/styles.css">
</head>
<body class="bg-white text-slate-800">
  <div id="root"></div>

  <!-- React + Babel (CDN, no build step) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Shared utilities -->
  <script type="text/babel" data-presets="env,react" src="./src/lib/icons.js"></script>
  <script type="text/babel" data-presets="env,react" src="./src/lib/ui.js"></script>

  <!-- Components -->
  <script type="text/babel" data-presets="env,react" src="./src/components/Nav.js"></script>
  <script type="text/babel" data-presets="env,react" src="./src/components/Hero.js"></script>
  <script type="text/babel" data-presets="env,react" src="./src/components/Services.js"></script>
  <script type="text/babel" data-presets="env,react" src="./src/components/About.js"></script>
  <script type="text/babel" data-presets="env,react" src="./src/components/Credentials.js"></script>
  <script type="text/babel" data-presets="env,react" src="./src/components/Contact.js"></script>
  <script type="text/babel" data-presets="env,react" src="./src/components/Footer.js"></script>

  <!-- App entry -->
  <script type="text/babel" data-presets="env,react" src="./src/App.js"></script>
</body>
</html>
